name: deploy-coordinator-mac-mini

# Auto-redeploys the wisent-compute coordinator daemon to the user's mac mini
# on every push to main that touches the orchestrator code paths.
#
# Runs on the self-hosted GitHub Actions runner installed on the mini itself
# (registered via deploy/install_github_runner.sh, labels self-hosted +
# mac-mini-coordinator). Because the runner already lives on the mini, the
# steps below are local cp / local bash — no SSH, no Tailscale OAuth, no
# rsync over the tailnet. The only outbound traffic is the runner's HTTPS
# poll to GitHub, which the mini already does.
#
# One-time bootstrap (already done on 2026-05-08, no re-run needed):
#   1. From an operator machine that has SSH to the mini, mint a
#      registration token and run the installer:
#        gh api -X POST /repos/wisent-ai/wisent-compute/actions/runners/registration-token \
#          --jq .token > /tmp/_tok
#        ssh charles@charless-mac-mini.tail6443b3.ts.net \
#          "REGISTRATION_TOKEN=$(cat /tmp/_tok) \
#           bash ~/wisent-compute-staging/deploy/install_github_runner.sh"
#   2. On the mac mini once: place an ADC service-account JSON at
#      ~/.config/gcloud/application_default_credentials.json (the
#      LaunchAgent's GOOGLE_APPLICATION_CREDENTIALS points at it).
# After that, every commit to main that matches the paths filter below
# triggers an automatic redeploy with no manual steps.

on:
  push:
    branches: [main]
    paths:
      - "wisent_compute/coordinator.py"
      - "wisent_compute/scheduler/**"
      - "wisent_compute/monitor/**"
      - "wisent_compute/queue/**"
      - "wisent_compute/models.py"
      - "wisent_compute/config.py"
      - "wisent_compute/cli.py"
      - "wisent_compute/targets/**"
      - "deploy/install_macos_coordinator.sh"
      - "deploy/install_github_runner.sh"
      - "pyproject.toml"
      - ".github/workflows/deploy-coordinator-mac-mini.yml"
  workflow_dispatch:

concurrency:
  group: wisent-compute-coordinator-mac-mini
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, mac-mini-coordinator]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run installer on mac mini
        run: bash deploy/install_macos_coordinator.sh

      - name: Verify coordinator is alive
        run: |
          launchctl print "gui/$(id -u)/com.wisent.compute.coordinator" \
            | sed -n '1,40p'
