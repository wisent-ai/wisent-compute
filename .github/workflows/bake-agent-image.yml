name: bake-agent-image

# Re-bakes the wisent-agent GCE image when the install stack changes.
# Manual: workflow_dispatch.

on:
  push:
    branches: [main]
    paths:
      - "pyproject.toml"
      - "deploy/bake_agent_image.sh"
      - "wisent_compute/templates/startup_gpu_agent.sh"
      - ".github/workflows/bake-agent-image.yml"
  workflow_dispatch:

concurrency:
  group: wisent-compute-bake-agent-image
  cancel-in-progress: false

jobs:
  bake:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: wisent-480400
      GCP_ZONE: us-central1-a
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1080673333190/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: wisent-compute-sa@wisent-480400.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Fetch HF_TOKEN from Secret Manager
        id: hf
        run: |
          HF_TOKEN=$(gcloud secrets versions access latest --secret=wisent-hf-token --project=${{ env.GCP_PROJECT }})
          echo "::add-mask::$HF_TOKEN"
          echo "HF_TOKEN=$HF_TOKEN" >> "$GITHUB_ENV"

      - name: Run bake_agent_image.sh
        env:
          GCP_PROJECT: ${{ env.GCP_PROJECT }}
          GCP_ZONE: ${{ env.GCP_ZONE }}
          HF_TOKEN: ${{ env.HF_TOKEN }}
        run: |
          chmod +x deploy/bake_agent_image.sh
          ./deploy/bake_agent_image.sh
