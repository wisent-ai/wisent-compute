name: deploy

on:
  push:
    branches: [main]
    paths:
      - "wisent_compute/**"
      - "deploy/**"
      - "config/**"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: wisent-compute-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: wisent-480400
      GCP_REGION: us-central1
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1080673333190/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: wisent-compute-sa@wisent-480400.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Show identity
        run: gcloud auth list && gcloud config list

      - name: Run deploy script
        run: bash deploy/gcp_setup.sh

      - name: Smoke-test the deployed Cloud Function
        run: |
          set -e
          URL=$(gcloud functions describe wisent-compute-tick \
            --gen2 --region="${GCP_REGION}" --project="${GCP_PROJECT}" \
            --format='value(serviceConfig.uri)')
          TOKEN=$(gcloud auth print-identity-token --audiences="$URL")
          curl -fsSL -H "Authorization: Bearer $TOKEN" "$URL" | head -c 200
