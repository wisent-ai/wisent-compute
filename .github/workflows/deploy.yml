name: deploy

on:
  push:
    branches: [main]
    paths:
      - "wisent_compute/**"
      - "deploy/**"
      - "config/**"
      - "pyproject.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: wisent-compute-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT: wisent-480400
      GCP_REGION: us-central1
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1080673333190/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: wisent-compute-sa@wisent-480400.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Show identity
        run: gcloud auth list && gcloud config list

      - name: Push compute-target registry to GCS
        # Single source of truth. Running agents re-fetch every poll cycle,
        # so a registry edit propagates without restarts or re-installs.
        run: |
          gsutil cp wisent_compute/targets/registry.json \
            gs://wisent-compute/registry.json

      - name: Redeploy Cloud Function
        run: bash deploy/redeploy_function.sh

      - name: Verify deployed revision is healthy
        # Cloud Functions Gen2 deploy already waits for the revision to pass
        # its health check before returning success — if redeploy_function.sh
        # exited 0 above, the revision is serving. We just record which
        # revision is now active for the run logs.
        run: |
          gcloud run revisions list \
            --service=wisent-compute-tick \
            --region="${GCP_REGION}" \
            --project="${GCP_PROJECT}" \
            --limit=3 \
            --format="table(metadata.name,status.conditions[0].status,metadata.creationTimestamp)"
